name: Trigger API Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Dispatch API deployment
        env:
          DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          set -Eeuo pipefail
          test -n "${DEPLOY_DISPATCH_TOKEN}" || { echo "DEPLOY_DISPATCH_TOKEN secret is required" >&2; exit 1; }

          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${DEPLOY_DISPATCH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/guara-vivo/guara-vivo-api/dispatches \
            --data '{"event_type":"worker-updated","client_payload":{"repository":"${{ github.repository }}","sha":"${{ github.sha }}","ref":"${{ github.ref_name }}"}}'
